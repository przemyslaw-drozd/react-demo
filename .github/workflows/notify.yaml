name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        shell: pwsh
        continue-on-error: true
        run: |
          npm test -- --watch=false 2>&1 | Tee-Object -FilePath test-output.log
          $exitCode = $LASTEXITCODE

          "exit_code=$exitCode" >> $env:GITHUB_OUTPUT

          $tail = (Get-Content test-output.log -Tail 40) -join "`n"

          $delimiter = "EOF_$([guid]::NewGuid().ToString('N'))"
          "summary<<$delimiter" >> $env:GITHUB_OUTPUT
          $tail >> $env:GITHUB_OUTPUT
          "$delimiter" >> $env:GITHUB_OUTPUT

          "### Test results" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          '```text' >> $env:GITHUB_STEP_SUMMARY
          $tail >> $env:GITHUB_STEP_SUMMARY
          '```' >> $env:GITHUB_STEP_SUMMARY

          exit $exitCode

      - name: Notify Teams with test output
        if: always()
        shell: pwsh
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TEAMS_WEBHOOK_URL)) {
            Write-Host "TEAMS_WEBHOOK_URL is not configured. Skipping Teams notification."
            exit 0
          }

          $status = if ($env:TEST_EXIT_CODE -eq "0") { "Success" } else { "Failed" }
          $icon = if ($env:TEST_EXIT_CODE -eq "0") { "✅" } else { "❌" }

          $message = @"
          $icon Tests: $status

          Repo: $env:GITHUB_REPOSITORY
          Branch: $env:GITHUB_REF_NAME
          Run: $env:RUN_URL

          Last test output:
          ``````text
          $env:TEST_SUMMARY
          ``````
          "@

          $payload = @{
            text = $message
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod `
            -Uri $env:TEAMS_WEBHOOK_URL `
            -Method Post `
            -ContentType "application/json" `
            -Body $payload

      - name: Fail workflow if tests failed
        if: always() && steps.tests.outputs.exit_code != '0'
        shell: pwsh
        run: |
          Write-Error "Tests failed."
          exit 1
