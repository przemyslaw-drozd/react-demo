name: CI

on:
  workflow_dispatch:
    inputs:
      mock_test_result:
        description: "Mock test result"
        required: true
        default: "success"
        type: choice
        options:
          - success
          - failure

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mock tests
        id: tests
        shell: bash
        continue-on-error: true
        env:
          MOCK_TEST_RESULT: ${{ inputs.mock_test_result }}
        run: |
          set +e

          {
            echo "Running mock test suite..."
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Branch: $GITHUB_REF_NAME"
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Run ID: $GITHUB_RUN_ID"
            echo ""
            echo "Test 1: login flow - passed"
            echo "Test 2: API response - passed"
          } 2>&1 | tee test-output.log

          if [ "$MOCK_TEST_RESULT" = "failure" ]; then
            {
              echo "Test 3: payment flow - failed"
              echo "Mock failure: expected status 200, got 500"
            } 2>&1 | tee -a test-output.log

            test_exit_code=1
            test_status="failure"
          else
            {
              echo "Test 3: payment flow - passed"
              echo ""
              echo "All mock tests passed."
            } 2>&1 | tee -a test-output.log

            test_exit_code=0
            test_status="success"
          fi

          echo "exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          echo "status=$test_status" >> "$GITHUB_OUTPUT"

          delimiter="EOF_TEST_OUTPUT"
          {
            echo "summary<<$delimiter"
            tail -n 50 test-output.log
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Test result"
            echo ""
            echo "**Status:** $test_status"
            echo ""
            echo '```text'
            cat test-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$test_exit_code"

      - name: Notify Teams with test result
        if: always()
        uses: ./.github/actions/teams-notify
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          status: ${{ steps.tests.outputs.status }}
          exit_code: ${{ steps.tests.outputs.exit_code }}
          summary: ${{ steps.tests.outputs.summary }}
          title: GitHub Actions tests

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    environment: production

    steps:
      - name: Deploy
        shell: bash
        run: |
          echo "Deploying to production..."
