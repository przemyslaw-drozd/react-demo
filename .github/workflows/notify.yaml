name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mock tests
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          echo "Running mock tests..."
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Notify Teams about test result
        if: always()
        shell: bash
        run: |
          echo "Send Teams test notification here"
          echo "Test result: ${{ steps.tests.outputs.exit_code }}"

      - name: Fail workflow if tests failed
        if: always() && steps.tests.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Tests failed"
          exit 1

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        shell: bash
        run: |
          echo "Deploying to production..."
