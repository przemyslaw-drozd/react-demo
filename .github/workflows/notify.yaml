name: CI

on:
  workflow_dispatch:
    inputs:
      mock_test_result:
        description: "Mock test result"
        required: true
        default: "success"
        type: choice
        options:
          - success
          - failure

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    outputs:
      test_status: ${{ steps.tests.outputs.status }}
      test_exit_code: ${{ steps.tests.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run mock tests
        id: tests
        shell: bash
        continue-on-error: true
        env:
          MOCK_TEST_RESULT: ${{ inputs.mock_test_result }}
        run: |
          set +e

          {
            echo "Running mock test suite..."
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Branch: $GITHUB_REF_NAME"
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Run ID: $GITHUB_RUN_ID"
            echo ""
            echo "Test 1: login flow - passed"
            echo "Test 2: API response - passed"
          } 2>&1 | tee test-output.log

          if [ "$MOCK_TEST_RESULT" = "failure" ]; then
            {
              echo "Test 3: payment flow - failed"
              echo "Mock failure: expected status 200, got 500"
            } 2>&1 | tee -a test-output.log

            test_exit_code=1
            test_status="failure"
          else
            {
              echo "Test 3: payment flow - passed"
              echo ""
              echo "All mock tests passed."
            } 2>&1 | tee -a test-output.log

            test_exit_code=0
            test_status="success"
          fi

          echo "exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          echo "status=$test_status" >> "$GITHUB_OUTPUT"

          delimiter="EOF_TEST_OUTPUT"
          {
            echo "summary<<$delimiter"
            tail -n 50 test-output.log
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Test result"
            echo ""
            echo "**Status:** $test_status"
            echo ""
            echo '```text'
            cat test-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$test_exit_code"

      - name: Notify Teams with test result
        if: always()
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL is not configured. Skipping Teams notification."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os

          status = os.getenv("TEST_STATUS", "unknown")
          exit_code = os.getenv("TEST_EXIT_CODE", "unknown")
          summary = os.getenv("TEST_SUMMARY", "").strip()

          if len(summary) > 2500:
              summary = summary[-2500:]
              summary = "...output truncated...\n" + summary

          icon = "✅" if status == "success" else "❌"
          title = f"{icon} GitHub Actions tests: {status}"

          payload = {
              "type": "message",
              "attachments": [
                  {
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                          "type": "AdaptiveCard",
                          "version": "1.4",
                          "body": [
                              {
                                  "type": "TextBlock",
                                  "text": title,
                                  "weight": "Bolder",
                                  "size": "Medium"
                              },
                              {
                                  "type": "FactSet",
                                  "facts": [
                                      {
                                          "title": "Repository",
                                          "value": os.getenv("REPO", "")
                                      },
                                      {
                                          "title": "Branch",
                                          "value": os.getenv("BRANCH", "")
                                      },
                                      {
                                          "title": "Workflow",
                                          "value": os.getenv("WORKFLOW", "")
                                      },
                                      {
                                          "title": "Run",
                                          "value": f"#{os.getenv('RUN_NUMBER', '')}"
                                      },
                                      {
                                          "title": "Triggered by",
                                          "value": os.getenv("ACTOR", "")
                                      },
                                      {
                                          "title": "Exit code",
                                          "value": exit_code
                                      }
                                  ]
                              },
                              {
                                  "type": "TextBlock",
                                  "text": "Test output",
                                  "weight": "Bolder",
                                  "spacing": "Medium"
                              },
                              {
                                  "type": "TextBlock",
                                  "text": summary if summary else "No test output captured.",
                                  "wrap": True,
                                  "fontType": "Monospace"
                              }
                          ],
                          "actions": [
                              {
                                  "type": "Action.OpenUrl",
                                  "title": "Open workflow run",
                                  "url": os.getenv("RUN_URL", "")
                              }
                          ]
                      }
                  }
              ]
          }

          with open("teams-payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

          curl --fail --silent --show-error \
            -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data @teams-payload.json

      - name: Fail workflow if tests failed
        if: always() && steps.tests.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Tests failed. Failing workflow after Teams notification."
          exit 1

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        shell: bash
        run: |
          echo "Deploying to production..."
          echo "This job started after production environment approval."
