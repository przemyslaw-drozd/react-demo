name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          echo "Mock tests"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Notify Teams about test result
        if: always()
        run: |
          echo "Send Teams notification here"

      - name: Fail if tests failed
        if: always() && steps.tests.outputs.exit_code != '0'
        run: exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy
        run: echo "Deploy after manual approval"
